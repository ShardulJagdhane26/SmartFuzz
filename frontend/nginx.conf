server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Gzip text-like responses to keep the bundle download tight.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # ── REST API proxy ───────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;   # long-running scan endpoints
        proxy_send_timeout 600s;
    }

    # ── WebSocket (Socket.IO) proxy ──────────────────────────────────────────
    # Required for the LiveScan page's real-time progress channel.
    location /socket.io/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;
    }

    # ── SPA fallback ─────────────────────────────────────────────────────────
    # Any path that isn't a static asset gets index.html so the React app can
    # render the right view client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
